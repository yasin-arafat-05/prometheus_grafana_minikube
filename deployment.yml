apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp

spec:
  replicas: 2 
  selector:
    matchLabels:
      app: flask-metrics-app

  template:
    metadata:
      labels:
        app: flask-metrics-app

    spec:
      containers:
      - name: flask-metrics-app
        image: flask-metrics-app:latest
        imagePullPolicy: Never
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
          requests:
            memory: "64Mi"
            cpu : "100m"
        ports:
        - containerPort: 5000

--- 
apiVersion: v1
kind: Service
metadata:
  name: myapp

spec:
  selector:
    app: flask-metrics-app

  ports:
  - protocol: TCP
    port: 5050
    targetPort: 5000
  type: NodePort 
  